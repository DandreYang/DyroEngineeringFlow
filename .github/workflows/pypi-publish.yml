name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing vX.Y.Z tag to build and publish"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out release source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Install project for tests
        run: python -m pip install --editable .

      - name: Run tests
        run: python -m unittest discover -s tests -t . -v

      - name: Check release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          metadata = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          expected = f"v{metadata['project']['version']}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload distributions for publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/dyro
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
